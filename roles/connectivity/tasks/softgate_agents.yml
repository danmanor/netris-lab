---
- name: Check if netris agent is running on softgates
  shell: |
    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@{{ item.mgmt_ip }} \
      "systemctl is-active netris-sg 2>/dev/null" 2>/dev/null
  loop: "{{ softgates }}"
  register: sg_agent_check
  changed_when: false
  ignore_errors: true

- name: Identify failed softgates
  ansible.builtin.set_fact:
    _failed_softgates: >-
      {{ sg_agent_check.results
         | selectattr('stdout', 'undefined')
         | list
         + sg_agent_check.results
         | selectattr('stdout', 'defined')
         | rejectattr('stdout', 'equalto', 'active')
         | list }}
    _sg_attempt: "{{ (_sg_attempt | default(0) | int) + 1 }}"

- name: Install netris agent on failed softgates
  when: _failed_softgates | length > 0
  shell: |
    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30 root@{{ item.item.mgmt_ip }} "
      curl -fsSL https://get.netris.io | sh -s -- \
        --lo {{ item.item.main_ip }} \
        --controller 10.8.0.2 \
        --hostname {{ item.item.name }} \
        --auth {{ netris_auth_token }} \
        --node-type {{ ns_fabric.softgate_node_type }}

      # Disable DPDK immediately (before any reboot)
      if [ -f /opt/netris/etc/netris.conf ]; then
        sed -i 's/^dpdk.*/dpdk                 = no/' /opt/netris/etc/netris.conf
        systemctl restart netris-sg 2>/dev/null || true
      fi
    " 2>&1 | tail -5
  loop: "{{ _failed_softgates }}"
  ignore_errors: true

- name: Wait for softgate agents to become active
  shell: |
    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@{{ item.mgmt_ip }} \
      "systemctl is-active netris-sg 2>/dev/null" 2>/dev/null
  loop: "{{ softgates }}"
  register: sg_active_check
  until: sg_active_check.stdout is defined and sg_active_check.stdout == "active"
  retries: 20
  delay: 15
  ignore_errors: true
  changed_when: false

- name: Check for still-failed softgates
  ansible.builtin.set_fact:
    _still_failed: >-
      {{ sg_active_check.results
         | rejectattr('stdout', 'defined')
         | list
         + sg_active_check.results
         | selectattr('stdout', 'defined')
         | rejectattr('stdout', 'equalto', 'active')
         | list }}

- name: Retry failed softgates
  when: _still_failed | length > 0 and _sg_attempt | int < 3
  block:
    - name: Report retry
      ansible.builtin.debug:
        msg: "{{ _still_failed | length }} softgate(s) still not active after attempt {{ _sg_attempt }}/3 — retrying install"

    - name: Retry softgate agent install
      ansible.builtin.include_tasks: softgate_agents.yml

- name: Fail if softgates still not active
  ansible.builtin.fail:
    msg: "{{ _still_failed | length }} softgate(s) failed to become active after {{ _sg_attempt }} attempts"
  when: _still_failed | length > 0 and _sg_attempt | int >= 3
