---
- name: Build softgate list
  set_fact:
    softgates: >-
      {%- set result = [] -%}
      {%- for i in range(ns_fabric.softgate_count) -%}
        {%- set _ = result.append({
          'name': 'ns-softgate-' ~ i,
          'mgmt_ip': '10.3.3.' ~ (i + 1),
          'main_ip': '10.2.3.' ~ (i + 1)
        }) -%}
      {%- endfor -%}
      {{ result }}

- name: Get traefik NodePort
  shell: kubectl get svc traefik -n kube-system -o jsonpath='{.spec.ports[?(@.name=="web")].nodePort}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: traefik_np
  changed_when: false

- name: Get auth token via collection
  ansible.builtin.include_role:
    name: netris.controller.general
  vars:
    netris_controller_url: "http://localhost:{{ traefik_np.stdout }}"
    netris_username: "{{ netris_login }}"
    general_state: read

- name: Wait for softgate VMs to be SSH-accessible
  wait_for:
    host: "{{ item.mgmt_ip }}"
    port: 22
    timeout: 600
    sleep: 15
  loop: "{{ softgates }}"
  ignore_errors: true

- name: Remove stale SSH host keys for softgates
  shell: ssh-keygen -R {{ item.mgmt_ip }} 2>/dev/null || true
  loop: "{{ softgates }}"
  changed_when: false

- name: Set softgate hostnames
  shell: |
    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@{{ item.mgmt_ip }} \
      "hostnamectl set-hostname {{ item.name }}" 2>/dev/null
  loop: "{{ softgates }}"
  ignore_errors: true
  changed_when: false

- name: Check if netris agent is running on softgates
  shell: |
    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@{{ item.mgmt_ip }} \
      "systemctl is-active netris-sg 2>/dev/null" 2>/dev/null
  loop: "{{ softgates }}"
  register: sg_agent_check
  changed_when: false
  ignore_errors: true

- name: Install netris agent on softgates and disable DPDK
  shell: |
    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=30 root@{{ item.item.mgmt_ip }} "
      curl -fsSL https://get.netris.io | sh -s -- \
        --lo {{ item.item.main_ip }} \
        --controller 10.8.0.2 \
        --hostname {{ item.item.name }} \
        --auth {{ netris_auth_token }} \
        --node-type {{ ns_fabric.softgate_node_type }}

      # Disable DPDK immediately (before any reboot)
      if [ -f /opt/netris/etc/netris.conf ]; then
        sed -i 's/^dpdk.*/dpdk                 = no/' /opt/netris/etc/netris.conf
        systemctl restart netris-sg 2>/dev/null || true
      fi
    " 2>&1 | tail -5
  loop: "{{ sg_agent_check.results }}"
  when: item.stdout is not defined or item.stdout != "active"
  ignore_errors: true

- name: Wait for softgate agents to become active
  shell: |
    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@{{ item.mgmt_ip }} \
      "systemctl is-active netris-sg 2>/dev/null" 2>/dev/null
  loop: "{{ softgates }}"
  register: sg_active_check
  until: sg_active_check.stdout is defined and sg_active_check.stdout == "active"
  retries: 20
  delay: 15
  ignore_errors: true
  changed_when: false

- name: Poll E-BGP sessions until all established
  ansible.builtin.uri:
    url: "http://localhost:{{ traefik_np.stdout }}/api/v2/ebgp"
    method: GET
    headers:
      Cookie: "connect.sid={{ netris_session_cookie }}"
    validate_certs: false
    timeout: 10
  register: _ebgp_poll
  until:
    - _ebgp_poll.json.data | length > 0
    - (_ebgp_poll.json.data | selectattr('bgp_state', 'defined') | selectattr('bgp_state', 'equalto', 'Established') | list | length) == (_ebgp_poll.json.data | length)
  retries: 40
  delay: 15

- name: Set E-BGP facts via collection
  ansible.builtin.include_role:
    name: netris.controller.ebgp
  vars:
    netris_controller_url: "http://localhost:{{ traefik_np.stdout }}"
    netris_username: "{{ netris_login }}"
    ebgp_state: read
