---
- name: Build softgate list
  set_fact:
    softgates: >-
      {%- set result = [] -%}
      {%- for i in range(ns_fabric.softgate_count) -%}
        {%- set _ = result.append({
          'name': 'ns-softgate-' ~ i,
          'mgmt_ip': '10.3.3.' ~ (i + 1),
          'main_ip': '10.2.3.' ~ (i + 1)
        }) -%}
      {%- endfor -%}
      {{ result }}

- name: Get traefik NodePort
  shell: kubectl get svc traefik -n kube-system -o jsonpath='{.spec.ports[?(@.name=="web")].nodePort}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: traefik_np
  changed_when: false

- name: Get auth token via collection
  ansible.builtin.include_role:
    name: netris.controller.general
  vars:
    netris_controller_url: "http://localhost:{{ traefik_np.stdout }}"
    netris_username: "{{ netris_login }}"
    general_state: read

- name: Wait for softgate VMs to be SSH-accessible
  wait_for:
    host: "{{ item.mgmt_ip }}"
    port: 22
    timeout: 600
    sleep: 15
  loop: "{{ softgates }}"
  ignore_errors: true

- name: Remove stale SSH host keys for softgates
  shell: ssh-keygen -R {{ item.mgmt_ip }} 2>/dev/null || true
  loop: "{{ softgates }}"
  changed_when: false

- name: Set softgate hostnames
  shell: |
    ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@{{ item.mgmt_ip }} \
      "hostnamectl set-hostname {{ item.name }}" 2>/dev/null
  loop: "{{ softgates }}"
  ignore_errors: true
  changed_when: false

- name: Install and verify softgate agents
  ansible.builtin.include_tasks: softgate_agents.yml

- name: Wait for all E-BGP sessions to establish
  ansible.builtin.include_tasks: ebgp_wait.yml
  vars:
    netris_controller_url: "http://localhost:{{ traefik_np.stdout }}"
    netris_username: "{{ netris_login }}"
